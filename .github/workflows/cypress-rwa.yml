name: Cypress RWA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      HUSKY: 0
    defaults:
      run:
        working-directory: ./cypress-realworld-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.15.0
          cache: yarn
          cache-dependency-path: cypress-realworld-app/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install RWA dependencies
        run: yarn --frozen-lockfile

      - name: Start RWA
        run: |
          nohup yarn start:ci > ../rwa.log 2>&1 &

      - name: Wait for app
        run: |
          yarn wait-on http://localhost:3000 http://localhost:3001 --timeout 300000 || (echo "===== RWA LOG =====" && cat ../rwa.log && exit 1)

      - name: Run Cypress
        run: yarn cypress:run

      - name: Show RWA log on failure
        if: failure()
        run: |
          echo "===== RWA LOG ====="
          if [ -f ../rwa.log ]; then
            cat ../rwa.log
          else
            echo "rwa.log not found"
          fi

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress-realworld-app/cypress/screenshots
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress-realworld-app/cypress/videos
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload RWA log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rwa-log
          path: rwa.log
          if-no-files-found: ignore
          retention-days: 14
