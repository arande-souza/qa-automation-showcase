name: Cypress RWA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.15.0
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Enable Corepack
        run: corepack enable

      - name: Install RWA dependencies
        working-directory: ./cypress-realworld-app
        run: yarn --frozen-lockfile

      - name: Start RWA
        run: |
          cd cypress-realworld-app
          nohup yarn start:ci > ../rwa.log 2>&1 &

      - name: Wait for app
        run: npx wait-on http://localhost:3000 http://localhost:3001 --timeout 300000

      - name: Run Cypress
        run: npx cypress run

      - name: Show RWA log on failure
        if: failure()
        run: cat rwa.log

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload RWA log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rwa-log
          path: rwa.log
          if-no-files-found: ignore
          retention-days: 14